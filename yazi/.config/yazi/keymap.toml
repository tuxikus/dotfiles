[mgr]

prepend_keymap = [
  { on = [ "!" ], run = 'shell "$SHELL" --block', desc = "Open $SHELL here" },
  { on = "<C-u>", run = "seek -5", desc = "Seek up 5 units in the preview" },
  { on = "<C-d>", run = "seek 5",  desc = "Seek down 5 units in the preview" },
  { on = [ "g", "r" ], run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel 2>/dev/null || pwd)"', desc = "Goto project root (git)" },
  { on = [ "g", "p" ], run = 'shell -- ya emit cd "$HOME/personal"', desc = "Goto personal space" },
  { on = [ "g", "w" ], run = 'shell -- ya emit cd "$HOME/work"', desc = "Goto work space" },
]
